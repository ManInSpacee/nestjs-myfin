services:
  web:
    container_name: nestjs_fin_web
    build:
      context: nest-fin-web
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api
  api:
    container_name: nestjs_fin_api
    build:
      context: nest-fin-api
      dockerfile: Dockerfile
    ports:
      - "3008:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_TTL=15m
      - JWT_REFRESH_TTL=7d
